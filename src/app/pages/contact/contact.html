<section class="contact">
  <div class="contact-page">
    <h1>Contact Us</h1>

    <p>
      We’d love to hear from you! Whether you have questions, suggestions, or feedback, you can
      reach out to us using the form below.
    </p>

    <form (ngSubmit)="submitForm()" #contactForm="ngForm">
      <div class="form-group">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" [(ngModel)]="contact.name" required />
      </div>

      <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" [(ngModel)]="contact.email" required />
      </div>

      <div class="form-group">
        <label for="message">Message:</label>
        <textarea
          id="message"
          name="message"
          [(ngModel)]="contact.message"
          rows="6"
          required
        ></textarea>
      </div>

      <button type="submit" [disabled]="!contactForm.form.valid">Send Message</button>
    </form>

    @if (submitted) {
      <div class="success-message">Thank you! Your message has been sent successfully.</div>
    }
  </div>
</section>
