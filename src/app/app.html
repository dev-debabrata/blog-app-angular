<div class="app-wrapper">
  @if (!hideLayout && !hideBreadcrumb) {
    <header>
      <app-navbar />
      <div class="breadcrumb">
        <app-breadcrumb />
      </div>
    </header>
  }

  <main class="page-container">
    <router-outlet />
  </main>

  @if (!hideLayout) {
    <app-footer />
  }
</div>
